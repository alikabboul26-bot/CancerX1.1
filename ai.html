<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CancerX AI Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>CancerX AI Predictor</h1>
      <p class="intro">
        Enter your blood test results and personal factors below to get an assessment of your potential blood cancer risk.
      </p>
    </header>

    <form id="aiForm">
      <div class="form-group">
        <label>Age:</label>
        <input type="number" id="age" required>
      </div>

      <div class="form-group">
        <label>Family History (1 = yes, 0 = no):</label>
        <input type="number" id="family" min="0" max="1" required>
      </div>

      <div class="form-group">
        <label>White Blood Cell Count (WBC):</label>
        <input type="number" id="wbc" required>
      </div>

      <div class="form-group">
        <label>Red Blood Cell Count (RBC):</label>
        <input type="number" id="rbc" required>
      </div>

      <div class="form-group">
        <label>Platelet Count:</label>
        <input type="number" id="platelets" required>
      </div>

      <button type="submit">Analyze</button>
    </form>

    <p id="result"></p>
  </div>

  <script src="script.js"></script>
  <p class="disclaimer">
  ⚠️ Note: CancerX AI is a predictive tool for awareness purposes. It does **not replace professional medical advice**.
</p>

<p id="result"></p>
</body>
</html>
